<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Velvet Dark Blue Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Glowing Neumorphic Vault Arch -->
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Soft radial glow behind the center -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>

    <!-- Drop shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Subtle grid overlay for structure -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="2">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Central Radial Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" />

  <!-- Vault Arch (The Protective Frame) -->
  <path d="M 128 400 L 128 200 A 128 128 0 0 1 384 200 L 384 400 Z" 
        fill="none" 
        stroke="url(#vaultGrad)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#shadow)" />

  <!-- Artistic Brush Strokes (The Emotional Heart) -->
  <!-- 1. Deep Magenta Stroke -->
  <path d="M 200 280 C 180 200, 320 160, 340 240 C 350 280, 310 330, 256 360" 
        fill="none" 
        stroke="#ec4899" 
        stroke-width="24" 
        stroke-linecap="round" 
        opacity="0.85" />

  <!-- 2. Cyan Stroke -->
  <path d="M 312 280 C 332 200, 192 160, 172 240 C 162 280, 202 330, 256 360" 
        fill="none" 
        stroke="#06b6d4" 
        stroke-width="18" 
        stroke-linecap="round" 
        opacity="0.85" />

  <!-- 3. Vibrant Gold Splash -->
  <path d="M 220 190 A 50 50 0 1 1 292 190" 
        fill="none" 
        stroke="#eab308" 
        stroke-width="14" 
        stroke-linecap="round" 
        opacity="0.9" />

  <!-- Glowing Core Light -->
  <circle cx="256" cy="260" r="16" fill="#ffffff" filter="url(#glowFilter)" />

  <!-- Vault Keyhole / Artist Seal in center-bottom -->
  <path d="M 256 324 L 256 344 M 251 344 L 261 344" 
        stroke="#ffffff" 
        stroke-width="6" 
        stroke-linecap="round" 
        opacity="0.9" />
  <circle cx="256" cy="316" r="8" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9" />
</svg>
